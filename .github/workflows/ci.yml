name: CI
on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Compile
        run: sbt compile
      - name: Fast tests (in-memory)
        run: sbt test
      - name: Integration tests (real Postgres)
        run: sbt It/test
